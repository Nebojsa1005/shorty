<div class="!flex !flex-col justify-between side-menu-container">
  <mat-nav-list class="!p-2">
    <div class="add-new-link-container">
      <button
        mat-flat-button
        color="primary"
        class="add-new-link-btn"
        (click)="newLink()"
      >
        <mat-icon class="material-symbols-outlined">add</mat-icon>
        Add New Minified Link
      </button>
    </div>

    <a
      routerLink="/all-links"
      routerLinkActive="active-link"
      #allLinks="routerLinkActive"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
    >
      <mat-list-item
        class="!mb-1 !rounded-sm"
        button
        [activated]="allLinks.isActive"
      >
        <div class="flex items-center">
          <mat-icon class="material-symbols-outlined mr-2">
            format_list_bulleted
          </mat-icon>
          <span class="menu-label">View All Minified Links</span>
        </div>
      </mat-list-item>
    </a>

    <!-- FEATURE FLAG: Controlled by environment.features.ANALYTICS_ENABLED -->
    @if (environment.features.ANALYTICS_ENABLED) {
      <a
        routerLink="/analytics"
        routerLinkActive="active-link"
        #analytics="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="onNavItemClick()"
      >
        <mat-list-item
          class="!mb-1 !rounded-sm"
          button
          [activated]="analytics.isActive"
        >
          <div class="flex items-center">
            <mat-icon class="mr-2 material-symbols-outlined" color="primary">bar_chart</mat-icon>
            <span class="menu-label">Analytics</span>
          </div>
        </mat-list-item>
      </a>
    }

    <a
      routerLink="/pricing"
      routerLinkActive="active-link"
      #pricing="routerLinkActive"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
    >
      <mat-list-item
        class="!mb-1 !rounded-sm"
        button
        [activated]="pricing.isActive"
      >
        <div class="flex items-center">
          <mat-icon class="material-symbols-outlined mr-2" color="primary"
            >sell</mat-icon
          >
          <span class="menu-label">Pricing</span>
        </div>
      </mat-list-item>
    </a>

    <a
      routerLink="/profile"
      routerLinkActive="active-link"
      #profile="routerLinkActive"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
    >
      <mat-list-item
        class="!mb-1 !rounded-sm"
        button
        [activated]="profile.isActive"
      >
        <div class="flex items-center">
          <mat-icon class="mr-2 material-symbols-outlined" color="primary">person_outline</mat-icon>
          <span class="menu-label">Profile</span>
        </div>
      </mat-list-item>
    </a>
  </mat-nav-list>

  <mat-list-item
    class="logout-button !cursor-pointer !mb-1 !rounded-sm"
    button
    (click)="onLogout()"
  >
    <div class="flex items-center">
      <mat-icon class="mr-2 material-symbols-outlined" color="primary">logout</mat-icon>
      <span class="menu-label">Logout</span>
    </div>
  </mat-list-item>
</div>
