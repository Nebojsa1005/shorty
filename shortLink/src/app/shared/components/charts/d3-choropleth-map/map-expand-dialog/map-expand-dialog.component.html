<div class="med-container">

  <!-- Header -->
  <div class="med-header">
    <h3 class="med-title">Geographic Distribution</h3>
    <button mat-icon-button (click)="close()" aria-label="Close" class="med-close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Map -->
  <div class="med-map">
    <app-d3-choropleth-map
      [countries]="data.countries"
      [height]="380"
      [canExpand]="false"
    ></app-d3-choropleth-map>
  </div>

  <!-- Country table -->
  @if (rows().length > 0) {
    <div class="med-table-wrap">
      <h4 class="med-table-heading">Countries</h4>
      <table class="med-table">
        <thead>
          <tr class="med-thead-row">
            <th class="med-th">Country</th>
            <th class="med-th med-th--right">Views</th>
            <th class="med-th med-th--right">Share</th>
          </tr>
        </thead>
        <tbody>
          @for (row of rows(); track row.name) {
            <tr class="med-tr">
              <td class="med-td">
                <div class="med-country-cell">
                  <span class="med-flag">{{ row.flag }}</span>
                  <span class="med-country-name">{{ row.name }}</span>
                </div>
              </td>
              <td class="med-td med-td--right med-td--num">{{ row.clicks.toLocaleString() }}</td>
              <td class="med-td med-td--right med-td--muted med-td--num">{{ row.pct }}%</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  } @else {
    <div class="med-empty">No country data available.</div>
  }

</div>
