<section class="stats">
  <div class="stats__inner">
    @for (stat of stats; track stat.label; let last = $last) {
      <div class="stat-item">
        <div class="stat-item__value">
          <span class="stat-item__number">0</span><span class="stat-item__suffix">{{ stat.suffix }}</span>
        </div>
        <span class="stat-item__label">{{ stat.label }}</span>
      </div>
      @if (!last) {
        <div class="stats__sep" aria-hidden="true"></div>
      }
    }
  </div>
</section>
