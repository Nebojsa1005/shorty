<section class="testimonials">
  <div class="testimonials__inner">
    <div class="section-label">Testimonials</div>
    <h2 class="section-title">Loved by teams &amp; creators</h2>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.name) {
        <div class="testimonial-card reveal">
          <!-- Quote mark -->
          <svg class="quote-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <path d="M14.017 21v-7.391c0-5.704 3.748-9.57 9-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.995zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.999v10h-9.999z" />
          </svg>

          <p class="testimonial-card__quote">{{ t.quote }}</p>

          <div class="testimonial-card__author">
            <div class="avatar" [style.background]="t.color">{{ t.initials }}</div>
            <div class="author-info">
              <span class="author-name">{{ t.name }}</span>
              <span class="author-role">{{ t.role }}, {{ t.company }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
