<footer class="footer">
  <div class="footer__inner">
    <div class="footer__brand">
      <a class="footer__logo" [routerLink]="['/landing']">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#footer-logo-grad)" />
          <path d="M8 14.5l4 4 8-9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          <defs>
            <linearGradient id="footer-logo-grad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#9a4eae" />
              <stop offset="1" stop-color="#392a48" />
            </linearGradient>
          </defs>
        </svg>
        Shorty
      </a>
      <p class="footer__tagline">Short links. Real insights.</p>
    </div>

    <div class="footer__links">
      <div class="footer__col">
        <span class="footer__col-title">Product</span>
        <ul>
          <li><a [routerLink]="['/landing']" fragment="features">Features</a></li>
          <li><a [routerLink]="['/pricing']">Pricing</a></li>
          <li><a [routerLink]="['/auth']">Get started</a></li>
        </ul>
      </div>

      <div class="footer__col">
        <span class="footer__col-title">Account</span>
        <ul>
          <li><a [routerLink]="['/auth']">Log in</a></li>
          <li><a [routerLink]="['/auth']">Sign up</a></li>
          <li><a [routerLink]="['/profile']">Settings</a></li>
        </ul>
      </div>

      <div class="footer__col">
        <span class="footer__col-title">Legal</span>
        <ul>
          <li><a href="#">Privacy policy</a></li>
          <li><a href="#">Terms of service</a></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="footer__bottom">
    <span>&copy; {{ year }} Shorty. All rights reserved.</span>
  </div>
</footer>
