<div class="breakdown-card">
  <h4 class="breakdown-title">Devices</h4>

  @if (!breakdown() || breakdown()!.deviceTypes.length === 0) {
    <p class="breakdown-empty">No device data yet.</p>
  } @else {
    @if (deviceItems().length > 0) {
      <app-d3-donut-chart
        [data]="deviceItems()"
        [colors]="donutColors"
        [height]="240"
        centerLabel="Total visits"
      ></app-d3-donut-chart>
    }

    @if (browserItems().length > 0) {
      <h4 class="breakdown-subtitle">Browsers</h4>
      <app-d3-bar-chart
        [data]="browserItems()"
        [gradientStart]="browserGradStart"
        [gradientEnd]="browserGradEnd"
        [labelWidth]="80"
        tooltipSuffix="clicks"
      ></app-d3-bar-chart>
    }

    @if (osItems().length > 0) {
      <h4 class="breakdown-subtitle">Operating Systems</h4>
      <app-d3-bar-chart
        [data]="osItems()"
        [gradientStart]="osGradStart"
        [gradientEnd]="osGradEnd"
        [labelWidth]="80"
        tooltipSuffix="clicks"
      ></app-d3-bar-chart>
    }
  }
</div>
