<div class="top-links-card">
  <div class="top-links-header">
    <h4 class="top-links-title">Top Links</h4>
    <div class="period-selector">
      @for (period of periods; track period) {
        <button
          class="period-btn"
          [class.period-btn--active]="activePeriod() === period"
          (click)="selectPeriod(period)"
        >
          {{ period | titlecase }}
        </button>
      }
    </div>
  </div>

  @if (displayedLinks().length === 0) {
    <p class="top-links-empty">No visit data yet.</p>
  } @else {
    <div class="top-links-list">
      @for (link of displayedLinks(); track link._id; let i = $index) {
        <div class="top-link-row">
          <div class="top-link-info">
            <span class="top-link-rank">{{ i + 1 }}</span>
            <div class="top-link-meta">
              <p class="top-link-name">{{ link.urlName }}</p>
              <p class="top-link-url">{{ link.shortLink }}</p>
            </div>
          </div>
          <div class="top-link-bar-wrap">
            <div class="top-link-track">
              <div
                class="top-link-fill"
                [style.width.%]="(link.visitCount / maxVisitCount()) * 100"
              ></div>
            </div>
            <span class="top-link-count">{{ link.visitCount }}</span>
          </div>
        </div>
      }
    </div>
  }
</div>
