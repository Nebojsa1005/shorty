<div class="breakdown-card">
  <h4 class="breakdown-title">Best Performing</h4>

  @if (hasData()) {
    <app-d3-bar-chart
      [data]="chartItems()"
      [gradientStart]="gradStart"
      [gradientEnd]="gradEnd"
      [labelWidth]="120"
      tooltipSuffix="clicks"
    ></app-d3-bar-chart>
  } @else {
    <p class="breakdown-empty">No link data yet.</p>
  }
</div>
