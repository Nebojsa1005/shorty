<div class="ts-card">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
    <mat-form-field
      class="w-full md:w-1/2 search-field"
      appearance="outline"
      color="primary"
    >
      <mat-label>Search</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Search" />
      <button mat-icon-button matSuffix disabled>
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

    <div class="flex gap-1">
      <button class="ts-period-btn" [class.ts-period-btn--active]="activeOptionButton() === '1m'" (click)="updateOptions('1m')">1M</button>
      <button class="ts-period-btn" [class.ts-period-btn--active]="activeOptionButton() === '6m'" (click)="updateOptions('6m')">6M</button>
      <button class="ts-period-btn" [class.ts-period-btn--active]="activeOptionButton() === '1y'" (click)="updateOptions('1y')">1Y</button>
      <button class="ts-period-btn" [class.ts-period-btn--active]="activeOptionButton() === 'all'" (click)="updateOptions('all')">All</button>
    </div>
  </div>

  @if (hasData()) {
    <app-d3-line-chart
      [series]="lineSeries()"
      [height]="350"
      [dateRange]="xAxisRange()"
    ></app-d3-line-chart>
  } @else {
    <p class="ts-no-data">No data to display.</p>
  }
</div>
