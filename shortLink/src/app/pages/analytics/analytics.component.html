<div class="flex flex-col gap-4 w-full">
	<!-- Row 1: Overview stat cards -->
	<app-overview-cards
	  [overview]="overview()"
	  [loading]="analyticsLoading()"
	></app-overview-cards>

	<!-- Row 2: Top Links -->
	<div class="flex flex-col md:flex-row gap-4 w-full">
		<div class="w-full">
			<app-top-links
			  [topLinks]="topLinks()"
			  [loading]="analyticsLoading()"
			  (periodChange)="onPeriodChange($event)"
			></app-top-links>
		</div>
	</div>

	<!-- Row 3: Device Breakdown + Location Breakdown -->
	<div class="flex flex-col md:flex-row gap-4 w-full">
		<div class="w-full md:w-1/2">
			@if (canViewAdvancedAnalytics() && !deviceBreakdownError()) {
				<app-device-breakdown
				  [breakdown]="deviceBreakdown()"
				  [loading]="analyticsLoading()"
				></app-device-breakdown>
			} @else {
				<app-upgrade-prompt
				  featureName="Device Breakdown"
				  [message]="deviceBreakdownError() || 'Device breakdown requires a Pro or Ultimate plan.'"
				></app-upgrade-prompt>
			}
		</div>
		<div class="w-full md:w-1/2">
			@if (canViewAdvancedAnalytics() && !locationBreakdownError()) {
				<app-location-breakdown
				  [breakdown]="locationBreakdown()"
				  [loading]="analyticsLoading()"
				></app-location-breakdown>
			} @else {
				<app-upgrade-prompt
				  featureName="Location Breakdown"
				  [message]="locationBreakdownError() || 'Location breakdown requires a Pro or Ultimate plan.'"
				></app-upgrade-prompt>
			}
		</div>
	</div>

	<!-- Row 4: Best Performing -->
	<div class="w-full">
		<app-best-preforming
		  [allLinks]="bestPreformingLinks()"
		  [allLinksLoading]="allLinksLoading()"
		></app-best-preforming>
	</div>
</div>
