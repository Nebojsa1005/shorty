<div class="invoice-card">
  <div class="invoice-info">
    <p class="invoice-name">{{ productName() }}</p>
    <p class="invoice-date">{{ invoice().attributes.created_at | date:'mediumDate' }}</p>
  </div>
  <div class="invoice-actions">
    <span class="invoice-total">{{ invoice().attributes.total_formatted }}</span>
    <button
      class="receipt-btn"
      [disabled]="loadingReceipt()"
      (click)="viewReceipt()"
    >
      @if (loadingReceipt()) {
        <mat-spinner diameter="14"></mat-spinner>
      } @else {
        View Receipt
      }
    </button>
  </div>
</div>
