<div class="form-panel">
  <div class="form-header">
    <h2 class="form-title">{{ isEdit ? "Edit Link" : "Add New Link" }}</h2>
  </div>

  <div class="form-body">
    <app-link-form
      (formChanges)="onFormChange($event)"
      [existingUrlLink]="existingLink"
      [isEdit]="isEdit ?? false"
    />

    <div class="actions-row">
      <button
        mat-flat-button
        color="primary"
        [disabled]="!urlForm()?.valid || (!isEdit && !canCreateLink())"
        (click)="onSubmit()"
      >
        {{ isEdit ? 'Edit Link' : 'Create Link' }}
      </button>
    </div>
  </div>
</div>
